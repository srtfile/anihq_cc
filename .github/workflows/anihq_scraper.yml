name: anihq Scraper

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # manual trigger anytime

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push data files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run extractor (500 URLs)
        run: python anihq_stream_extractor.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anihq_cc.json anihq_cc_readable.txt already_processed_url.txt anihq_error_faced_url_list.txt
          git diff --cached --quiet || git commit -m "scrape: batch update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push